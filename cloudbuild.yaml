steps:
  # Step 1: Install dependencies and run automated test suite
  - name: 'node:18-slim'
    id: 'test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci
        npm test

  # Step 2: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vantage-git:$COMMIT_SHA', '.']
    waitFor: ['test']

  # Step 3: Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', 'gcr.io/$PROJECT_ID/vantage-git:$COMMIT_SHA']
    waitFor: ['build']

  # Step 4: Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vantage-git'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vantage-git:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--labels'
      - 'app=vantage,env=production'
    waitFor: ['push']

images:
  - 'gcr.io/$PROJECT_ID/vantage-git:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '600s'